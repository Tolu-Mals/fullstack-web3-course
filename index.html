<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buy Me A Coffee | Web3</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="container">
        <h1>☕ Coffee Fund</h1>
        <p class="subtitle">Support the developer with some ETH</p>
        
        <div class="card-section">
            <button id="connectButton">Connect Wallet</button>

            <div class="input-group">
                <label for="ethAmount">Amount to send</label>
                <input id="ethAmount" type="number" step="0.01" placeholder="0.1 ETH" />
            </div>

            <button id="fundButton">Send Coffee 🚀</button>

            <div class="button-grid">
                <button id="balanceButton" class="secondary-btn">Check Balance</button>
                <button id="withdrawButton" class="secondary-btn">Withdraw</button>
            </div>

            <div id="statusText" class="status-indicator">
                Waiting for connection...
            </div>
        </div>
    </div>

    <script src="/app.ts" type="module"></script>
  </body>
</html>
